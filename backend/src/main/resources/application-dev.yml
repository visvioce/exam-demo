spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:exam_system}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

# AES 加密密钥配置
aes:
  secret: ${AES_SECRET:your_aes_secret_key_here}

logging:
  level:
    com.southcollege.exam: debug
    org.springframework.jdbc: debug
